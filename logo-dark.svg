<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 58" height="48" role="img" aria-label="Instituto de Direito Aplicado">
  <!-- Shield dark -->
  <defs>
    <linearGradient id="shieldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3350"/>
      <stop offset="100%" stop-color="#1a1f35"/>
    </linearGradient>
    <linearGradient id="shieldDarkLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#242942"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M5,3 L51,3 L51,36 Q51,55 28,57 Q5,55 5,36 Z" fill="url(#shieldDark)"/>
  <!-- Shield left panel (darker) -->
  <path d="M5,3 L28,3 L28,57 Q5,55 5,36 Z" fill="url(#shieldDarkLeft)" opacity="0.6"/>
  <!-- Shield border -->
  <path d="M5,3 L51,3 L51,36 Q51,55 28,57 Q5,55 5,36 Z" fill="none" stroke="#3a4060" stroke-width="1"/>

  <!-- Balance scale (left portion of shield) -->
  <!-- Center pole -->
  <line x1="18" y1="14" x2="18" y2="32" stroke="#f4722b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top bar -->
  <line x1="11" y1="17" x2="25" y2="17" stroke="#f4722b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left pan string -->
  <line x1="12" y1="17" x2="11" y2="24" stroke="#f4722b" stroke-width="1" stroke-linecap="round"/>
  <!-- Right pan string -->
  <line x1="24" y1="17" x2="25" y2="24" stroke="#f4722b" stroke-width="1" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M8,24 Q11,27 14,24" fill="none" stroke="#f4722b" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M22,24 Q25,27 28,24" fill="none" stroke="#f4722b" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="14" y1="32" x2="22" y2="32" stroke="#f4722b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bar chart (right-bottom of shield) -->
  <rect x="31" y="36" width="4" height="12" rx="1" fill="#f4722b" opacity="0.7"/>
  <rect x="36" y="30" width="4" height="18" rx="1" fill="#f4722b" opacity="0.85"/>
  <rect x="41" y="24" width="4" height="24" rx="1" fill="#f4722b"/>

  <!-- Trend arrow (diagonal, overlapping) -->
  <line x1="31" y1="38" x2="45" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polygon points="45,22 39,22 45,28" fill="white"/>

  <!-- Text: INSTITUTO DE -->
  <text x="60" y="18" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="600" letter-spacing="1.5" fill="#555555">INSTITUTO DE</text>
  <!-- Text: Direito -->
  <text x="59" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="800" fill="#f4722b">Direito</text>
  <!-- Text: Aplicado -->
  <text x="59" y="53" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="800" fill="#f4722b">Aplicado</text>
</svg>
